<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHX Font Viewer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .file-input {
            padding: 20px;
            border: 2px dashed #ccc;
            border-radius: 4px;
            text-align: center;
        }
        .characters-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 10px;
            padding: 20px;
        }
        .character-cell {
            border: 1px solid #ccc;
            padding: 10px;
            text-align: center;
            border-radius: 4px;
            cursor: pointer;
            transition: transform 0.1s ease-in-out;
            height: 140px;
            display: flex;
            flex-direction: column;
        }
        .character-cell:hover {
            transform: scale(1.02);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        .character-svg {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 0; /* allow flex child to shrink */
        }

        .character-svg svg {
            width: 100%;
            height: 100%;
        }
        .character-info {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }
        .font-info {
            background-color: #f5f5f5;
            padding: 20px;
            border-radius: 4px;
        }
        .font-info h2 {
            margin-top: 0;
            margin-bottom: 15px;
        }
        .font-info-grid {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 8px;

            line-height: 1em;
        }
        .font-info-label {
            font-weight: bold;
            color: #333;
        }
        .font-info-value {
            color: #666;
        }
        .mode-selector {
            display: flex;
            margin-bottom: 10px;
            border-bottom: 1px solid #ccc;
        }
        .mode-tab {
            padding: 10px 20px;
            cursor: pointer;
            border: 1px solid transparent;
            border-bottom: none;
            margin-bottom: -1px;
        }
        .mode-tab.active {
            background-color: #fff;
            border-color: #ccc;
            border-bottom-color: #fff;
        }
        .mode-content {
            display: none;
        }
        .mode-content.active {
            display: block;
        }
        .font-select {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .search-container {
            margin: 10px 0;
            display: none;
            align-items: center;
            position: relative;
        }
        .search-input {
            flex: 1;
            padding: 10px;
            padding-right: 30px;  /* Space for the clear button */
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }
        .search-clear {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            font-size: 18px;
            color: #999;
            display: none;
        }
        .search-clear:hover {
            color: #666;
        }
        .format-toggle {
            display: none;  /* Hide by default */
            align-items: center;
            gap: 10px;
            margin: 5px 0;
        }
        .format-toggle label {
            cursor: pointer;
            user-select: none;
        }
        .format-toggle input[type="checkbox"] {
            margin: 0;
        }
        .format-toggle .dot {
            display: inline-block;
            border-radius: 50%;
            vertical-align: -1px;
            opacity: 0.5;
        }
        .format-toggle .dot-red {
            width: 10px;
            height: 10px;
            margin-right: 4px;
            background: red;
        }
        .format-toggle .dot-blue {
            width: 8px;
            height: 8px;
            margin: 0 4px;
            background: blue;
        }
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        /* Modal styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            max-width: 90%;
            max-height: 90%;
            position: relative;
        }

        .modal-close {
            position: absolute;
            right: 10px;
            top: 10px;
            font-size: 24px;
            cursor: pointer;
            background: none;
            border: none;
            padding: 5px;
        }

        .modal-close:hover {
            color: #666;
        }

        .modal svg {
            width: 500px;
            height: 500px;
        }

        .modal-character-info {
            text-align: center;
            margin-top: 10px;
            font-size: 16px;
            color: #333;
        }

        .modal-frame-legend {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-top: 8px;
            font-size: 12px;
            color: #666;
        }

        .modal-frame-legend span {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .legend-swatch {
            width: 14px;
            height: 14px;
            border: 1px solid red;
            border-radius: 2px;
        }

        .legend-swatch-cap {
            background: rgba(255, 0, 0, 0.06);
        }

        .legend-swatch-descender {
            background: rgba(255, 0, 0, 0.14);
        }

        .legend-baseline {
            width: 14px;
            border-top: 2px dashed red;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>SHX Font Viewer</h1>
        
        <div class="mode-selector">
            <div class="mode-tab active" data-mode="local">Local Font File</div>
            <div class="mode-tab" data-mode="remote">Remote Font Library</div>
        </div>

        <div id="localMode" class="mode-content active">
            <div class="file-input">
                <input type="file" id="shxFile" accept=".shx" />
                <p>Select an SHX font file to view its characters</p>
            </div>
        </div>

        <div id="remoteMode" class="mode-content">
            <select id="remoteFontSelect" class="font-select">
                <option value="">Select a font from the library...</option>
            </select>
        </div>

        <div id="loading" class="loading">
            Loading font data...
        </div>

        <div id="fontInfo" class="font-info" style="display: none;">
            <h2>Font Information</h2>
            <div class="font-info-grid">
                <div class="font-info-label">Font Type:</div>
                <div id="fontType" class="font-info-value"></div>
                <div class="font-info-label">File Version:</div>
                <div id="fileVersion" class="font-info-value"></div>
                <div class="font-info-label">Is Font:</div>
                <div id="isFont" class="font-info-value"></div>
                <div class="font-info-label">Number of Characters:</div>
                <div id="charCount" class="font-info-value"></div>
                <div class="font-info-label" id="namedShapeLabel" style="display: none;">Named Shapes:</div>
                <div id="namedShapeCount" class="font-info-value" style="display: none;"></div>
                <div class="font-info-label">Font Additional Info:</div>
                <div id="fontAdditionalInfo" class="font-info-value"></div>
            </div>
        </div>
        
        <div class="search-container">
            <input type="text" id="codeSearch" class="search-input" placeholder="Search by code or shape name (e.g. 65, 0x41, GRS)" />
            <button type="button" id="searchClear" class="search-clear" aria-label="Clear search">&times;</button>
        </div>

        <div class="format-toggle">
            <input type="checkbox" id="formatToggle">
            <label for="formatToggle">Show codes in hexadecimal format</label>
            <input type="checkbox" id="markersToggle">
            <label for="markersToggle">
                <span class="dot dot-red" aria-hidden="true"></span>insertion (0, 0)
                ·
                <span class="dot dot-blue" aria-hidden="true"></span>lastPoint (end vector)
            </label>
        </div>

        <div id="charactersGrid" class="characters-grid"></div>
    </div>

    <!-- Modal for larger shape display -->
    <div id="shapeModal" class="modal">
        <div class="modal-content">
            <button class="modal-close">&times;</button>
            <div id="modalShape"></div>
            <div id="modalCharacterInfo" class="modal-character-info"></div>
            <div id="modalFrameLegend" class="modal-frame-legend">
                <span><i class="legend-swatch legend-swatch-cap"></i>capHeight</span>
                <span><i class="legend-baseline"></i>baseline</span>
                <span><i class="legend-swatch legend-swatch-descender"></i>descenderHeight</span>
            </div>
        </div>
    </div>

    <script type="module">
        import { ShxFont, ShxFontType, shapeEncodedWithTopOrigin } from './dist/index.es.js';

        class ShxFontViewer {
            constructor() {
                this.fileInput = document.getElementById('shxFile');
                this.grid = document.getElementById('charactersGrid');
                this.fontInfoDiv = document.getElementById('fontInfo');
                this.remoteFontSelect = document.getElementById('remoteFontSelect');
                this.loadingDiv = document.getElementById('loading');
                this.codeSearch = document.getElementById('codeSearch');
                this.searchClear = document.getElementById('searchClear');
                this.searchContainer = document.querySelector('.search-container');
                this.formatToggle = document.getElementById('formatToggle');
                this.markersToggle = document.getElementById('markersToggle');
                this.formatToggleContainer = document.querySelector('.format-toggle');
                this.modal = document.getElementById('shapeModal');
                this.modalClose = document.querySelector('.modal-close');
                this.modalShape = document.getElementById('modalShape');
                this.modalCharacterInfo = document.getElementById('modalCharacterInfo');
                this.font = null;
                this.displaySize = 12;
                this.glyphPreviewSettings = null;
                const baseUrl = 'https://cdn.jsdelivr.net/gh/mlightcad/cad-data/';
                this.fontBaseUrl = baseUrl + 'fonts/';
                this.fontLibraryUrl = this.fontBaseUrl + 'fonts.json';
                this.allCharacterCells = new Map(); // Store all character cells

                this.init();
            }

            init() {
                this.fileInput.addEventListener('change', this.handleFileSelect.bind(this));
                this.remoteFontSelect.addEventListener('change', this.handleRemoteFontSelect.bind(this));
                this.codeSearch.addEventListener('input', this.handleSearch.bind(this));
                this.codeSearch.addEventListener('input', this.toggleClearButton.bind(this));
                this.searchClear.addEventListener('click', this.clearSearch.bind(this));
                this.formatToggle.addEventListener('change', () => this.updateCodeFormat());
                this.markersToggle.addEventListener('change', () => this.font && this.displayCharacters());
                this.initModeTabs();
                this.initModal();
                this.loadFontLibrary();
            }

            initModeTabs() {
                const tabs = document.querySelectorAll('.mode-tab');
                tabs.forEach(tab => {
                    tab.addEventListener('click', () => {
                        // Remove active class from all tabs and contents
                        tabs.forEach(t => t.classList.remove('active'));
                        document.querySelectorAll('.mode-content').forEach(c => c.classList.remove('active'));
                        
                        // Add active class to clicked tab and corresponding content
                        tab.classList.add('active');
                        document.getElementById(tab.dataset.mode + 'Mode').classList.add('active');
                        
                        // Clear previous display
                        this.clearDisplay();
                    });
                });
            }

            clearDisplay() {
                this.grid.innerHTML = '';
                this.fontInfoDiv.style.display = 'none';
                this.searchContainer.style.display = 'none';
                this.formatToggleContainer.style.display = 'none';
                this.font = null;
                this.allCharacterCells.clear();
                this.glyphPreviewSettings = null;
                this.codeSearch.value = '';
            }

            async loadFontLibrary() {
                try {
                    const response = await fetch(this.fontLibraryUrl);
                    if (!response.ok) throw new Error('Failed to load font library');
                    const fonts = await response.json();
                    
                    // Clear existing options except the first one
                    this.remoteFontSelect.innerHTML = '<option value="">Select a font from the library...</option>';
                    
                    // Filter and add only SHX font options
                    fonts
                        .filter(font => font.type === 'shx')
                        .forEach(font => {
                            const option = document.createElement('option');
                            option.value = font.file;
                            option.textContent = font.name;
                            this.remoteFontSelect.appendChild(option);
                        });

                    if (this.remoteFontSelect.options.length === 1) {
                        // If no SHX fonts were found
                        const option = document.createElement('option');
                        option.disabled = true;
                        option.textContent = 'No SHX fonts available';
                        this.remoteFontSelect.appendChild(option);
                    }
                } catch (error) {
                    console.error('Error loading font library:', error);
                    alert('Error loading font library');
                }
            }

            async handleRemoteFontSelect(event) {
                const fontFile = event.target.value;
                if (!fontFile) return;

                this.loadingDiv.style.display = 'block';
                this.clearDisplay();

                try {
                    const response = await fetch(this.fontBaseUrl + fontFile);
                    if (!response.ok) throw new Error('Failed to load font file');
                    const arrayBuffer = await response.arrayBuffer();
                    this.font = new ShxFont(arrayBuffer);
                    this.displayFontInfo();
                    this.displayCharacters();
                } catch (error) {
                    console.error('Error loading remote font:', error);
                    alert('Error loading remote font file');
                } finally {
                    this.loadingDiv.style.display = 'none';
                }
            }

            async handleFileSelect(event) {
                const file = event.target.files[0];
                if (!file) return;

                this.loadingDiv.style.display = 'block';
                this.clearDisplay();

                try {
                    const arrayBuffer = await file.arrayBuffer();
                    this.font = new ShxFont(arrayBuffer);
                    this.displayFontInfo();
                    this.displayCharacters();
                } catch (error) {
                    console.error('Error loading font:', error);
                    alert('Error loading font file');
                } finally {
                    this.loadingDiv.style.display = 'none';
                }
            }

            displayFontInfo() {
                const fontData = this.font.fontData;
                const header = fontData.header;
                const content = fontData.content;

                // Show the font info section, search container, and format toggle
                this.fontInfoDiv.style.display = 'block';
                this.searchContainer.style.display = 'flex';
                this.formatToggleContainer.style.display = 'flex';

                // Update font information
                document.getElementById('fontType').textContent = header.fontType;
                document.getElementById('fileVersion').textContent = header.fileVersion;
                const isTextFont = header.fontType !== 'shapes' || 0 in content.data;
                document.getElementById('isFont').textContent = isTextFont ? 'Yes (text file)' : 'No (shape file)';
                document.getElementById('charCount').textContent = Object.keys(content.data).length;

                const namedShapeLabel = document.getElementById('namedShapeLabel');
                const namedShapeCount = document.getElementById('namedShapeCount');
                const namedCount = content.names ? Object.keys(content.names).length : 0;
                namedShapeLabel.style.display = namedCount > 0 ? '' : 'none';
                namedShapeCount.style.display = namedCount > 0 ? '' : 'none';
                namedShapeCount.textContent = namedCount;

                document.getElementById('fontAdditionalInfo').textContent = content.info
            }

            getGlyphPreviewSettings() {
                if (this.glyphPreviewSettings) {
                    return this.glyphPreviewSettings;
                }

                const metrics = this.font.getFontMetrics(this.displaySize);
                const sampleCode = this.font.hasChar(65)
                    ? 65
                    : parseInt(Object.keys(this.font.fontData.content.data)[0], 10);
                const sample = this.font.getCharShape(sampleCode, this.displaySize);
                const usesTopOrigin =
                    sample &&
                    !this.font.fontData.content.dualOrientation &&
                    (this.font.fontData.header.fontType === ShxFontType.UNIFONT ||
                        shapeEncodedWithTopOrigin(this.font.fontData, sample, metrics));

                this.glyphPreviewSettings = {
                    usesTopOrigin,
                    fontCell: {
                        width: metrics.cellWidth,
                        capHeight: metrics.capHeight,
                        descenderHeight: metrics.descenderHeight,
                        origin: usesTopOrigin ? 'top' : 'baseline',
                    },
                };
                return this.glyphPreviewSettings;
            }

            getPreviewCharShape(code) {
                const { usesTopOrigin } = this.getGlyphPreviewSettings();
                return usesTopOrigin
                    ? this.font.getCharShape(code, this.displaySize)
                    : this.font.getLayoutCharShape(code, this.displaySize);
            }

            getShapeSvgOptions() {
                return { fontCell: this.getGlyphPreviewSettings().fontCell };
            }

            getModalShapeSvgOptions() {
                return {
                    fontCell: {
                        ...this.getGlyphPreviewSettings().fontCell,
                        expandToFit: true,
                        showFrame: true,
                    },
                };
            }

            getMarkerRadius(shape, scale = 1) {
                if (this.font) {
                    const metrics = this.font.getFontMetrics(this.displaySize);
                    return Math.max(metrics.cellWidth, metrics.totalHeight, 1) * 0.04 * scale;
                }
                const { maxX, minX, maxY, minY } = shape.bbox;
                return Math.max(maxX - minX, maxY - minY, 1) * 0.04 * scale;
            }

            createMarkerCircle(cx, cy, r, fill) {
                const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                circle.setAttribute('cx', String(cx));
                circle.setAttribute('cy', String(cy));
                circle.setAttribute('r', String(r));
                circle.setAttribute('fill', fill);
                circle.setAttribute('fill-opacity', '0.5');
                circle.setAttribute('stroke', 'white');
                circle.setAttribute('stroke-opacity', '0.5');
                circle.setAttribute('stroke-width', String(r * 0.25));
                return circle;
            }

            /** Append insertion point (0,0) and lastPoint markers to an SVG element */
            appendShapeMarkers(svg, shape) {
                svg.appendChild(this.createMarkerCircle(0, 0, this.getMarkerRadius(shape, 1.15), 'red'));

                if (shape.lastPoint) {
                    const { x, y } = shape.lastPoint;
                    svg.appendChild(this.createMarkerCircle(x, -y, this.getMarkerRadius(shape, 0.85), 'blue'));
                }
            }

            createCharacterCell(code, shape) {
                const cell = document.createElement('div');
                cell.className = 'character-cell';

                const svgString = shape.toSVG(this.getShapeSvgOptions());
                
                // Create a temporary div to parse the SVG string
                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = svgString;
                const svg = tempDiv.querySelector('svg');
                if (this.markersToggle.checked) {
                    this.appendShapeMarkers(svg, shape);
                }
                const svgWrap = document.createElement('div');
                svgWrap.className = 'character-svg';
                svgWrap.appendChild(svg);
                cell.appendChild(svgWrap);

                const info = document.createElement('div');
                info.className = 'character-info';
                info.dataset.code = code;
                const shapeName = this.font.getShapeName(parseInt(code));
                if (shapeName) {
                    info.dataset.name = shapeName;
                }
                this.updateCellFormat(info, code, shapeName);
                cell.appendChild(info);

                // Add click handler to show modal
                cell.addEventListener('click', () => this.showModal(code, shape, shapeName));

                return cell;
            }

            formatCode(code) {
                const numCode = parseInt(code);
                return this.formatToggle.checked ?
                    `0x${numCode.toString(16).toUpperCase()}` :
                    `${code}`;
            }

            updateCellFormat(infoElement, code, shapeName) {
                const codeText = this.formatCode(code);
                infoElement.textContent = shapeName ?
                    `${shapeName} (${codeText})` :
                    `Code: ${codeText}`;
            }

            updateCodeFormat() {
                this.allCharacterCells.forEach((cell, code) => {
                    const info = cell.querySelector('.character-info');
                    this.updateCellFormat(info, code, info.dataset.name);
                });
            }

            displayCharacters() {
                this.grid.innerHTML = '';
                this.allCharacterCells.clear();
                const fontData = this.font.fontData;
                const entries = Object.entries(fontData.content.data);
                const batchSize = 80;
                let index = 0;

                const appendBatch = () => {
                    const end = Math.min(index + batchSize, entries.length);
                    for (; index < end; index++) {
                        const [code] = entries[index];
                        const shape = this.getPreviewCharShape(parseInt(code, 10));
                        if (shape) {
                            const cell = this.createCharacterCell(code, shape);
                            this.allCharacterCells.set(code, cell);
                            this.grid.appendChild(cell);
                        }
                    }
                    if (index < entries.length) {
                        requestAnimationFrame(appendBatch);
                    }
                };

                requestAnimationFrame(appendBatch);
            }

            handleSearch(event) {
                const searchValue = event.target.value.trim();
                const isBigFont = this.font.fontData.header.fontType === ShxFontType.BIGFONT;
                
                this.allCharacterCells.forEach((cell, code) => {
                    if (searchValue === '') {
                        cell.style.display = ''; // Show all when search is empty
                    } else {
                        const info = cell.querySelector('.character-info');
                        const shapeName = info?.dataset.name;
                        const searchLower = searchValue.toLowerCase();
                        const nameMatch = shapeName && shapeName.toLowerCase().includes(searchLower);

                        let searchCode;
                        if (searchValue.toLowerCase().startsWith('0x')) {
                            // Handle hexadecimal input
                            searchCode = parseInt(searchValue, 16).toString();
                        } else {
                            // Handle decimal input
                            searchCode = parseInt(searchValue).toString();
                        }

                        if (nameMatch) {
                            cell.style.display = '';
                        } else if (!isNaN(parseInt(searchCode))) {
                            cell.style.display = code === searchCode ? '' : 'none';
                        } else if (!isBigFont) {
                            // For regular fonts, convert to Unicode
                            const charCode = searchValue.charCodeAt(0);
                            cell.style.display = code === charCode.toString() ? '' : 'none';
                        } else {
                            cell.style.display = 'none';
                        }
                    }
                });
            }

            toggleClearButton() {
                this.searchClear.style.display = this.codeSearch.value ? 'block' : 'none';
            }

            clearSearch() {
                this.codeSearch.value = '';
                this.searchClear.style.display = 'none';
                this.handleSearch({ target: this.codeSearch });
            }

            initModal() {
                // Close modal when clicking the close button
                this.modalClose.addEventListener('click', () => {
                    this.modal.style.display = 'none';
                });

                // Close modal when clicking outside the modal content
                this.modal.addEventListener('click', (e) => {
                    if (e.target === this.modal) {
                        this.modal.style.display = 'none';
                    }
                });

                // Close modal with Escape key
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape' && this.modal.style.display === 'flex') {
                        this.modal.style.display = 'none';
                    }
                });
            }

            showModal(code, shape, shapeName) {
                this.modalShape.innerHTML = '';

                const svgString = shape.toSVG(this.getModalShapeSvgOptions());

                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = svgString;
                const svg = tempDiv.querySelector('svg');
                if (this.markersToggle.checked) {
                    this.appendShapeMarkers(svg, shape);
                }

                this.modalShape.appendChild(svg);

                const codeText = this.formatCode(code);
                this.modalCharacterInfo.textContent = shapeName ?
                    `Shape: ${shapeName} (Code: ${codeText})` :
                    `Character Code: ${codeText}`;

                // Show modal
                this.modal.style.display = 'flex';
            }
        }

        // Initialize the viewer
        new ShxFontViewer();
    </script>
</body>
