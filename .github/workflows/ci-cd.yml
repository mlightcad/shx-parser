name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  ci:
    runs-on: ubuntu-latest
    environment: release

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.22.2
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'
          scope: '@mlightcad'

      - name: Upgrade npm for Trusted Publishing
        if: startsWith(github.ref, 'refs/tags/')
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Run tests
        run: pnpm test -- --runInBand

      # Authenticates via npm Trusted Publishing (OIDC); no NPM_TOKEN needed.
      # Configure the package on npmjs.com → Settings → Trusted publishing:
      #   Provider: GitHub Actions
      #   Repository: mlightcad/shx-parser
      #   Workflow filename: ci-cd.yml
      #   Environment: release  (must match the job environment below)
      - name: Publish package to npm
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          npm --version
          # setup-node writes an empty _authToken line that blocks OIDC fallback
          if [ -f "$HOME/.npmrc" ]; then
            sed -i '/_authToken/d' "$HOME/.npmrc"
          fi
          pnpm publish:package

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true

  deploy:
    needs: [ci]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.22.2
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm example

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: './examples/'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
